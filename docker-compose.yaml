services:
  sqlc:
    image: sqlc/sqlc:1.31.1
    volumes:
      - .:/src
    working_dir: /src
  postgres:
    image: postgres:18.3-bookworm
    environment:
      - POSTGRES_PASSWORD=123
    volumes:
      - ./out/pgdata:/var/lib/postgresql

  app:
    build: .
    ports:
      -8080: 8080
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
  
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports: 
      - "16686:16686"
      - "4317:4317"